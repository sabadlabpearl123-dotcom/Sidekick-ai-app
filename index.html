<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidekick AI — Technical Prototype v2.0</title>
    <!-- FontAwesome Icons for HUD, Navigation Deck, and Premium Crown -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CORE CONFIGURATION RESET */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #020005;
            color: #f1e7fe;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* PREMIUM MINIMALIST GALAXY CANVAS */
        .app-canvas {
            position: relative;
            width: 100%;
            max-width: 412px;
            height: 95vh;
            /* Seamless dark stellar fog background layout */
            background: 
                radial-gradient(circle at 50% 40%, rgba(147, 51, 234, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 80% 20%, rgba(236, 72, 153, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 10% 80%, rgba(56, 189, 248, 0.08) 0%, transparent 40%),
                #05020c;
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), inset 0 1px 2px rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 26px 24px;
            overflow: hidden;
        }

        /* WELCOME GREETING OVERLAY SCREEN */
        .welcome-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0e051f 0%, #030107 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .welcome-hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.05);
        }
        .welcome-logo {
            font-size: 24px;
            font-weight: 300;
            color: #ffffff;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
            margin-bottom: 8px;
        }
        .welcome-subtitle {
            font-size: 12px;
            color: #a78bfa;
            opacity: 0.7;
            margin-bottom: 48px;
            letter-spacing: 1px;
        }
        .wake-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(168, 85, 247, 0.4);
            outline: none;
            padding: 14px 36px;
            border-radius: 25px;
            color: #ffffff;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .wake-btn:active {
            background: rgba(168, 85, 247, 0.2);
            transform: scale(0.97);
        }

        /* SLEEK PREMIUM HUD DISPLAY HEADER */
        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .identity-box h2 {
            font-size: 16px;
            font-weight: 400;
            color: #ffffff;
            letter-spacing: 0.5px;
        }
        .identity-box p {
            font-size: 11px;
            color: #a78bfa;
            opacity: 0.6;
            margin-top: 2px;
        }
        .vault-counters {
            display: flex;
            gap: 8px;
        }
        .vault-pill {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            color: #e2d5f8;
            backdrop-filter: blur(5px);
        }
        .pill-shard i { color: #f472b6; }
        .pill-time i { color: #38bdf8; }

        /* PURIFICATION REWARD FLOATING NOTIFICATION */
        .reward-toast {
            background: rgba(15, 6, 31, 0.9);
            border: 1px solid rgba(244, 114, 182, 0.3);
            border-radius: 20px;
            padding: 8px 18px;
            font-size: 12px;
            color: #f472b6;
            font-weight: 500;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 50;
            align-self: center;
            backdrop-filter: blur(8px);
        }
        .toast-visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* FAINT LIGHT ROTATION MATRIX STAGE WITH PREMIUM CROWN */
        .stage-box {
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        /* PREMIUM CROWN DISPLAY STYLING (WITH POINTER-EVENTS FIXED) */
        .premium-crown {
            position: absolute;
            top: 20%;
            font-size: 26px;
            color: #fbbf24;
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.6), 0 2px 4px rgba(0,0,0,0.5);
            z-index: 20;
            pointer-events: none;
            animation: floatingCrown 4s infinite ease-in-out;
        }

        .faint-orbit-ring {
            position: absolute;
            width: 280px;
            height: 280px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-left: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 50%;
            animation: spinClockwise 35s infinite linear;
        }
        .faint-orbit-inner {
            position: absolute;
            width: 220px;
            height: 220px;
            border: 1px dashed rgba(255, 255, 255, 0.02);
            border-right: 1px dashed rgba(56, 189, 248, 0.15);
            border-radius: 50%;
            animation: spinCounter 20s infinite linear;
        }

        /* DEEP IRIDESCENT LIQUID GLASS ORB */
        .galaxy-orb {
            position: relative;
            width: 154px;
            height: 154px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 25%, #ffffff 0%, #a78bfa 20%, #6d28d9 50%, #3b0764 80%, #05010d 100%);
            box-shadow: 
                0 0 45px rgba(147, 51, 234, 0.5), 
                0 0 90px rgba(236, 72, 153, 0.2),
                inset -12px -12px 30px rgba(0, 0, 0, 0.9), 
                inset 12px 12px 25px rgba(255, 255, 255, 0.4);
            cursor: pointer;
            border: none;
            outline: none;
            z-index: 10;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .galaxy-orb:active {
            transform: scale(0.94);
        }
        
        .status-prompt {
            font-size: 13px;
            font-weight: 400;
            color: #ffffff;
            opacity: 0.8;
            letter-spacing: 1px;
            margin-top: 36px;
            z-index: 10;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            animation: smoothPulse 2.5s infinite ease-in-out;
        }

        /* MINIMALIST ARCHIVE LOG PANEL SHEET */
        .logs-overlay {
            position: absolute;
            bottom: 95px;
            left: 24px;
            right: 24px;
            height: 230px;
            background: rgba(7, 3, 15, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 18px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9);
            z-index: 40;
            transform: translateY(160%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(15px);
        }
        .overlay-active {
            transform: translateY(0) !important;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .panel-title {
            font-size: 13px;
            font-weight: 500;
            color: #c084fc;
            letter-spacing: 0.5px;
        }
        .panel-close {
            background: transparent;
            border: none;
            color: #a78bfa;
            font-size: 12px;
            cursor: pointer;
            opacity: 0.7;
        }
        .panel-close:hover { opacity: 1; }
        
        .panel-body {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .panel-body::-webkit-scrollbar { width: 2px; }
        .panel-body::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); }
        
        .stream-card {
            font-size: 12px;
            line-height: 1.5;
            color: #cbd5e1;
            padding-left: 10px;
            border-left: 2px solid rgba(168, 85, 247, 0.5);
            margin-bottom: 4px;
        }
        .stream-timestamp {
            font-size: 10px;
            color: #a78bfa;
            opacity: 0.6;
            display: block;
            margin-bottom: 2px;
        }

        /* CLEAN MINIMAL FOOTER NAVIGATION DOCK */
        .navigation-dock {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            z-index: 10;
        }
        .action-button {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 12px 2px;
            color: #ffffff;
            font-size: 11px;
            font-weight: 400;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.25s ease;
        }
        .action-button i {
            font-size: 13px;
            color: #a78bfa;
            opacity: 0.8;
        }
        .action-button:active, .btn-active-glow {
            background: rgba(147, 51, 234, 0.08);
            border-color: rgba(168, 85, 247, 0.3);
        }

        /* ENGINE TIMELINE KEYFRAMES */
        @keyframes spinClockwise {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes spinCounter {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        @keyframes smoothPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        @keyframes floatingCrown {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        @keyframes listeningPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 40px #22c55e, 0 0 80px rgba(34, 197, 94, 0.3), inset -12px -12px 30px rgba(0,0,0,0.9); }
            50% { transform: scale(1.04); box-shadow: 0 0 55px #4ade80, 0 0 95px rgba(74, 222, 128, 0.5), inset -12px -12px 30px rgba(0,0,0,0.9); }
        }
        .orb-state-listening {
            animation: listeningPulse 1.1s infinite ease-in-out !important;
            background: radial-gradient(circle at 35% 25%, #ffffff 0%, #4ade80 20%, #22c55e 55%, #14532d 90%) !important;
        }
    </style>
</head>
<body>

    <div class="app-canvas">
        
        <!-- WELCOME GREETING OVERLAY -->
        <div id="intro-screen" class="welcome-overlay">
            <i class="fa-solid fa-crown" style="color: #fbbf24; font-size: 32px; margin-bottom: 12px; filter: drop-shadow(0 0 10px rgba(251,191,36,0.5));"></i>
            <h1 class="welcome-logo">Sidekick AI</h1>
            <p class="welcome-subtitle">Technical Operations Engine v2.0</p>
            <button onclick="initializeCoreEngine()" class="wake-btn">Sync Node</button>
        </div>

        <!-- TOP HUD METRICS OVERLAY -->
        <div class="hud-header">
            <div class="identity-box">
                <h2>Sidekick AI <i class="fa-solid fa-crown" style="color: #fbbf24; font-size: 12px; margin-left: 2px;"></i></h2>
                <p>Status: Synchronized</p>
            </div>
            
            <div class="vault-counters">
                <div class="vault-pill pill-shard">
                    <i class="fa-solid fa-shapes"></i> Shards: <span id="shard-lbl">0</span>
                </div>
                <div class="vault-pill pill-time">
                    <i class="fa-solid fa-wave-square"></i> Voice: <span id="time-lbl">5.0</span>m
                </div>
            </div>
        </div>

        <!-- FLOATING PURIFICATION TOAST ALERT -->
        <div id="reward-toast" class="reward-toast">
            +1 Shard Safely Purified
        </div>

        <!-- CORE GALAXY ORB THEATRICAL STAGE WITH FLOATING CROWN -->
        <div class="stage-box">
            <!-- Premium Crown Floating Right Above the Orb Layout Matrix -->
            <i class="fa-solid fa-crown premium-crown"></i>
            
            <div class="faint-orbit-ring"></div>
            <div class="faint-orbit-inner"></div>

            <!-- THE CORE GLOSSY INTERACTIVE LIQUID BULB -->
            <button id="interaction-orb" class="galaxy-orb"></button>
            
            <p id="state-prompt" class="status-prompt">Tap Core to Speak</p>
        </div>

        <!-- OVERLAY CHRONICLE STORAGE INVENTORY PANEL -->
        <div id="archive-logs" class="logs-overlay">
            <div class="panel-header">
                <div class="panel-title">[Resonance Ledger Entries]</div>
                <button onclick="toggleArchiveLogsView()" class="panel-close">Dismiss</button>
            </div>
            <div id="archive-stream" class="panel-body"></div>
        </div>

        <!-- SYMMETRIC ACTION DOCK -->
        <div class="navigation-dock">
            <button onclick="executeAmbientScan()" class="action-button">
                <i class="fa-solid fa-expand"></i>
                <span>[Scan]</span>
            </button>
            <button onclick="executeSilentWhisperNode()" class="action-button">
                <i class="fa-solid fa-feather"></i>
                <span>[Type]</span>
            </button>
            <button onclick="executeShardRedemptionCycle()" class="action-button">
                <i class="fa-solid fa-bolt"></i>
                <span>[Redeem]</span>
            </button>
            <button onclick="toggleArchiveLogsView()" class="action-button">
                <i class="fa-solid fa-fingerprint"></i>
                <span>[Vault]</span>
            </button>
        </div>

    </div>

    <!-- MAIN ENGINE SCRIPT LOGIC WORKER -->
    <script>
        const interactionOrb = document.getElementById('interaction-orb');
        const statePrompt = document.getElementById('state-prompt');
        const shardLbl = document.getElementById('shard-lbl');
        const timeLbl = document.getElementById('time-lbl');
        const archiveStream = document.getElementById('archive-stream');
        const rewardToast = document.getElementById('reward-toast');
        const introScreen = document.getElementById('intro-screen');

        let shardInventoryCount = 0;
        let voiceChannelMinutes = 5.0;
        let isOrbListening = false;
        let speechPipelineAuthenticated = false;

        // FIXED INTENT SYSTEM NODES (GREETING, COMFORT, & ATTENTIVE PATHWAYS)
        const emotionalIntentNodes = {
            comfort: {
                tone: "Comforting",
                text: "I know you have a bad day today. You should rest first, and I'm just here waiting for you.",
                hex: "radial-gradient(circle at 35% 25%, #ffffff 0%, #f472b6 20%, #db2777 50%, #4c0519 80%, #020005 100%)",
                glow: "0 0 50px rgba(219, 39, 119, 0.7)",
                rate: 0.85,
                pitch: 0.95
            },
            greeting: {
                tone: "Greeting",
                text: "Good day user! It's a good day to start and spread positivity today.",
                hex: "radial-gradient(circle at 35% 25%, #ffffff 0%, #fde047 15%, #ca8a04 50%, #451a03 80%, #020005 100%)",
                glow: "0 0 50px rgba(234, 179, 8, 0.7)",
                rate: 1.0,
                pitch: 1.15
            },
            listening: {
                tone: "Attentive",
                text: "Just say what you want, I'm here to listen.",
                hex: "radial-gradient(circle at 35% 25%, #ffffff 0%, #67e8f9 20%, #0891b2 50%, #164e63 80%, #020005 100%)",
                glow: "0 0 50px rgba(6, 182, 212, 0.7)",
                rate: 0.9,
                pitch: 1.05
            }
        };

        // LOCAL POOL DATASET MATRIX
        const dynamicResponseUniverse = [
            { 
                tone: "Calm", 
                text: "Your system is stable and aligned. Your aura balance looks perfect right now.", 
                hex: "radial-gradient(circle at 35% 25%, #ffffff 0%, #a78bfa 20%, #6d28d9 50%, #3b0764 80%, #020005 100%)", 
                glow: "0 0 50px rgba(139, 92, 246, 0.6)",
                rate: 0.8,
                pitch: 0.9
            },
            { 
                tone: "Focused", 
                text: "Telemetry pathways optimized. Matrix integrity confirmed. Ready to receive advanced commands.", 
                hex: "radial-gradient(circle at 35% 25%, #ffffff 0%, #86efac 15%, #16a34a 50%, #14532d 80%, #020005 100%)", 
                glow: "0 0 50px rgba(34, 197, 94, 0.6)",
                rate: 0.95,
                pitch: 1.0
            }
        ];

        // STARTUP SCREEN ACTION CONTROL
        function initializeCoreEngine() {
            introScreen.classList.add('welcome-hidden');
            if (!speechPipelineAuthenticated) {
                window.speechSynthesis.cancel();
                const initWave = new SpeechSynthesisUtterance("");
                window.speechSynthesis.speak(initWave);
                speechPipelineAuthenticated = true;
                
                writeInteractionToUiLog("System Awakening", "Vault channels aligned. Say keywords like 'sad', 'tired', 'hello', or ask it to 'listen' to trigger dedicated node configurations.", "Neutral");
            }
        }

        // TEXT INTERPRETATION INTENT ANALYZER ENGINE
        function parseInputIntent(rawString) {
            const cleanInput = rawString.toLowerCase();
            
            // Checking for comfort/sad markers
            if (cleanInput.includes('sad') || cleanInput.includes('tired') || cleanInput.includes('bad') || cleanInput.includes('exhausted') || cleanInput.includes('down')) {
                return emotionalIntentNodes.comfort;
            }
            // Checking for greeting markers
            if (cleanInput.includes('hello') || cleanInput.includes('hi') || cleanInput.includes('hey') || cleanInput.includes('morning') || cleanInput.includes('greet') || cleanInput.includes('good day')) {
                return emotionalIntentNodes.greeting;
            }
            // Checking for attentive listening markers
            if (cleanInput.includes('listen') || cleanInput.includes('talk') || cleanInput.includes('speak') || cleanInput.includes('want') || cleanInput.includes('hear')) {
                return emotionalIntentNodes.listening;
            }
            
            // Default random fallback distribution system
            return dynamicResponseUniverse[Math.floor(Math.random() * dynamicResponseUniverse.length)];
        }

        // ONE-TOUCH INPUT LOGIC LOOP
        function triggerOrbProcessingCycle() {
            if (!speechPipelineAuthenticated) return;
            window.speechSynthesis.cancel(); 

            if (!isOrbListening) {
                // USER TAP 1: ENTER LISTENING STATE
                isOrbListening = true;
                interactionOrb.classList.add('orb-state-listening');
                statePrompt.innerText = "Listening... (Simulating text trigger context via prompt next)";
            } else {
                // USER TAP 2: GENERATE RESPONSE EVENT
                isOrbListening = false;
                interactionOrb.classList.remove('orb-state-listening');
                statePrompt.innerText = "Processing matrix fragments...";

                setTimeout(() => {
                    // Simulating a voice recognition response intake box layout context
                    const spokenSimulation = prompt("Simulate what you just said to the orb assistant (e.g., 'listen to me', 'I am tired', 'Hello'):");
                    commitShardPurificationEvent("Voice Intake");
                    
                    const derivedNode = parseInputIntent(spokenSimulation || "");
                    dispatchCoreFeedbackOutput(derivedNode);
                }, 400);
            }
        }

        interactionOrb.addEventListener('click', triggerOrbProcessingCycle);

        // SILENT INTENT WHISPER NODE
        function executeSilentWhisperNode() {
            if (!speechPipelineAuthenticated) return;
            window.speechSynthesis.cancel();

            const textWhisperValue = prompt("Type your whisper thoughts securely (e.g. 'listen', 'sad', 'hello', etc.):");
            if (textWhisperValue && textWhisperValue.trim() !== "") {
                statePrompt.innerText = "Encoding text metric tokens...";
                
                setTimeout(() => {
                    commitShardPurificationEvent("Silent Whispering");
                    const derivedNode = parseInputIntent(textWhisperValue);
                    dispatchCoreFeedbackOutput(derivedNode);
                }, 500);
            }
        }

        // REDEEM VOICETIME CONVERSION ECONOMY BLOCK
        function executeShardRedemptionCycle() {
            if (shardInventoryCount >= 1) {
                shardInventoryCount--;
                voiceChannelMinutes += 1.0;
                
                shardLbl.innerText = shardInventoryCount;
                timeLbl.innerText = voiceChannelMinutes.toFixed(1);

                window.speechSynthesis.cancel();
                const audioChimeFeedback = new SpeechSynthesisUtterance("Shard dissolved. Extra minutes added safely.");
                window.speechSynthesis.speak(audioChimeFeedback);

                alert("Redemption Complete: 1 Shard exchanged for +1.0 minute of premium voice capacity.");
            } else {
                alert("Insufficient Resources! You have 0 Shards. Tap the center Orb or click [Type] to purify a fragment first.");
            }
        }

        function commitShardPurificationEvent(sourceIdentifier) {
            shardInventoryCount++;
            shardLbl.innerText = shardInventoryCount;
            
            rewardToast.innerText = `+1 Shard Purified via ${sourceIdentifier}`;
            rewardToast.classList.add('toast-visible');
            setTimeout(() => rewardToast.classList.remove('toast-visible'), 2400);
        }

        // OUTPUT DRIVER CORE MANAGEMENT ENGINE
        function dispatchCoreFeedbackOutput(node) {
            statePrompt.innerText = "Tap Core to Speak";
            
            // Step 1: Adjust Visual State Metrics System
            interactionOrb.style.background = node.hex;
            interactionOrb.style.boxShadow = node.glow;

            // Step 2: Web Speech Synthesis Processing Core
            const structuralUtterance = new SpeechSynthesisUtterance(node.text);
            structuralUtterance.rate = node.rate;
            structuralUtterance.pitch = node.pitch;
            window.speechSynthesis.speak(structuralUtterance);

            // Step 3: Insert Entry Records row into UI Storage Logs
            writeInteractionToUiLog(node.tone, node.text, node.tone);
        }

        // ACCOUNTABILITY LOG WRITER SCHEDULER SYSTEM
        function writeInteractionToUiLog(classification, text, emotionalLabel) {
            const now = new Date();
            const timeString = now.toTimeString().split(' ')[0];

            const trackingDiv = document.createElement('div');
            trackingDiv.className = "stream-card";
            trackingDiv.innerHTML = `
                <span class="stream-timestamp">[${timeString}] Intent Analysis: ${classification}</span>
                <b style="color:#f472b6">[${emotionalLabel}]</b> ${text}
            `;
            archiveStream.insertBefore(trackingDiv, archiveStream.firstChild);
        }

        function toggleArchiveLogsView() {
            document.getElementById('archive-logs').classList.toggle('overlay-active');
        }

        function executeAmbientScan() {
            alert("Environmental telemetry scanned successfully. Premium Matrix optimized.");
            // Standard baseline greetings run inside the setup layout cycle routine context 
            dispatchCoreFeedbackOutput(emotionalIntentNodes.greeting);
        }
    </script>
</body>
</html>
