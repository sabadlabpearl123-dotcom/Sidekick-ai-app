<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidekick AI — Technical Prototype v2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CORE CONFIGURATION RESET */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: #020005; color: #f1e7fe; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; width: 100vw; overflow: hidden; user-select: none; }

        /* PREMIUM MINIMALIST GALAXY CANVAS */
        .app-canvas { position: relative; width: 100%; max-width: 412px; height: 95vh; background: radial-gradient(circle at 50% 40%, rgba(147, 51, 234, 0.15) 0%, transparent 60%), #05020c; border-radius: 40px; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8); display: flex; flex-direction: column; justify-content: space-between; padding: 26px 24px; }

        /* HUD HEADER */
        .hud-header { display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .identity-box h2 { font-size: 16px; font-weight: 400; color: #ffffff; }
        
        /* CROWN MOVED TO HEADER - CLICKABLE */
        .header-crown { font-size: 18px; color: #fbbf24; cursor: pointer; margin-left: 8px; transition: transform 0.2s; }
        .header-crown:active { transform: scale(1.2); }

        /* STAGE */
        .stage-box { position: relative; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .galaxy-orb { width: 154px; height: 154px; border-radius: 50%; background: radial-gradient(circle at 35% 25%, #ffffff 0%, #a78bfa 20%, #6d28d9 50%, #05010d 100%); box-shadow: 0 0 45px rgba(147, 51, 234, 0.5); cursor: pointer; border: none; transition: all 0.6s ease; }
        .orb-state-listening { animation: listeningPulse 1.1s infinite; background: radial-gradient(circle at 35% 25%, #ffffff 0%, #4ade80 20%, #22c55e 55%, #14532d 90%) !important; }

        .navigation-dock { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .action-button { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 12px 2px; color: #fff; font-size: 11px; cursor: pointer; }

        @keyframes listeningPulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 40px #22c55e; } 50% { transform: scale(1.04); box-shadow: 0 0 55px #4ade80; } }
    </style>
</head>
<body>
    <div class="app-canvas">
        <!-- HUD HEADER WITH MOVED CROWN -->
        <div class="hud-header">
            <div class="identity-box">
                <h2>Sidekick AI 
                    <i class="fa-solid fa-crown header-crown" onclick="alert('Redirecting to Premium...')"></i>
                </h2>
            </div>
        </div>

        <div class="stage-box">
            <button id="interaction-orb" class="galaxy-orb" onclick="triggerOrbProcessingCycle()"></button>
            <p id="state-prompt" style="margin-top: 36px; font-size: 13px; opacity: 0.8;">Tap Orb to Speak</p>
        </div>

        <div class="navigation-dock">
            <button class="action-button">Scan</button>
            <button class="action-button">Type</button>
            <button class="action-button">Redeem</button>
            <button class="action-button">Vault</button>
        </div>
    </div>

    <script>
        let isOrbListening = false;
        const interactionOrb = document.getElementById('interaction-orb');
        const statePrompt = document.getElementById('state-prompt');

        function triggerOrbProcessingCycle() {
            isOrbListening = !isOrbListening;
            if(isOrbListening) {
                interactionOrb.classList.add('orb-state-listening');
                statePrompt.innerText = "Listening...";
            } else {
                interactionOrb.classList.remove('orb-state-listening');
                statePrompt.innerText = "Processing...";
                setTimeout(() => { statePrompt.innerText = "Tap Orb to Speak"; }, 1000);
            }
        }
    </script>
</body>
</html>
