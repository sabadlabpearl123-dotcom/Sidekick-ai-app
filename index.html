<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidekick AI — Technical Prototype v2.1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CORE CONFIGURATION RESET */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: #020005; color: #f1e7fe; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; width: 100vw; overflow: hidden; user-select: none; }

        /* PREMIUM MINIMALIST GALAXY CANVAS */
        .app-canvas { position: relative; width: 100%; max-width: 412px; height: 95vh; background: radial-gradient(circle at 50% 40%, rgba(147, 51, 234, 0.15) 0%, transparent 60%), #05020c; border-radius: 40px; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8); display: flex; flex-direction: column; padding: 26px 24px; }

        /* PREMIUM CROWN - NOW INTERACTIVE */
        .premium-crown {
            position: absolute;
            top: 20%;
            font-size: 28px;
            color: #fbbf24;
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.8);
            z-index: 25;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease;
            animation: floatingCrown 4s infinite ease-in-out;
        }
        .premium-crown:active { transform: translateY(-8px) scale(1.2); filter: brightness(1.5); }

        /* DEEP IRIDESCENT LIQUID GLASS ORB */
        .stage-box { position: relative; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .galaxy-orb {
            width: 154px; height: 154px; border-radius: 50%;
            background: radial-gradient(circle at 35% 25%, #ffffff 0%, #a78bfa 20%, #6d28d9 50%, #05010d 100%);
            box-shadow: 0 0 45px rgba(147, 51, 234, 0.5), inset -12px -12px 30px rgba(0, 0, 0, 0.9);
            cursor: pointer; border: none; outline: none; z-index: 10;
        }
        .galaxy-orb:active { transform: scale(0.94); }
        .orb-state-listening { animation: listeningPulse 1.1s infinite ease-in-out !important; background: radial-gradient(circle at 35% 25%, #ffffff 0%, #4ade80 20%, #22c55e 55%, #14532d 90%) !important; }

        /* HUD & DOCK - KEEPING PREVIOUS DESIGN */
        .hud-header { display: flex; justify-content: space-between; align-items: center; }
        .navigation-dock { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .action-button { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 12px 2px; color: #fff; font-size: 11px; cursor: pointer; }
        
        @keyframes floatingCrown { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes listeningPulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 40px #22c55e; } 50% { transform: scale(1.04); box-shadow: 0 0 55px #4ade80; } }
    </style>
</head>
<body>
    <div class="app-canvas">
        <div class="hud-header">
            <h2>Sidekick AI <i class="fa-solid fa-crown" style="color: #fbbf24; font-size: 12px;"></i></h2>
        </div>

        <div class="stage-box">
            <i class="fa-solid fa-crown premium-crown" onclick="triggerOrbProcessingCycle()"></i>
            
            <button id="interaction-orb" class="galaxy-orb" onclick="triggerOrbProcessingCycle()"></button>
            <p id="state-prompt" style="margin-top: 36px; font-size: 13px; opacity: 0.8;">Tap Orb or Crown to Speak</p>
        </div>

        <div class="navigation-dock">
            <button onclick="executeAmbientScan()" class="action-button"><i class="fa-solid fa-expand"></i><span>[Scan]</span></button>
            <button onclick="executeSilentWhisperNode()" class="action-button"><i class="fa-solid fa-feather"></i><span>[Type]</span></button>
            </div>
    </div>

    <script>
        // ... (Previous logic remains the same)
        // Ensure triggerOrbProcessingCycle is defined as before
        function triggerOrbProcessingCycle() {
            // Your existing logic for listening/processing
            console.log("Interaction triggered via Crown or Orb");
            // ... (rest of your logic)
        }
    </script>
</body>
</html>
