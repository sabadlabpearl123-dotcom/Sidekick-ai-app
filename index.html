<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidekick AI - Quantum Core</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
/* ===== YOUR ORIGINAL DESIGN (UNCHANGED STYLE CORE) ===== */

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:#040212;
color:white;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

/* APP SHELL */
.app-shell{
position:relative;
width:100%;
max-width:420px;
height:100vh;
background:#05021a;
overflow:hidden;
padding:18px;
display:flex;
flex-direction:column;
gap:12px;
}

/* BACKGROUND FX (UNCHANGED) */
.app-shell::before{
content:'';
position:absolute;
inset:0;
pointer-events:none;
background:
radial-gradient(circle at 50% 60%, rgba(147,51,234,0.22), transparent 60%),
radial-gradient(circle at 20% 30%, rgba(168,85,247,0.1), transparent 50%);
z-index:1;
}

.app-shell::after{
content:'';
position:absolute;
inset:0;
pointer-events:none;
opacity:.4;
background-image:
radial-gradient(white 1px, transparent 20px),
radial-gradient(white 1.5px, transparent 30px);
background-size:250px 250px, 400px 400px;
animation:spaceMove 60s linear infinite;
z-index:1;
}

/* INTRO */
.intro-screen{
position:absolute;
inset:0;
background:#03010a;
z-index:999;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;
}

/* HEADER */
.top-header{
display:flex;
justify-content:space-between;
align-items:center;
z-index:5;
}

.app-title{
font-weight:800;
letter-spacing:3px;
}

.icon-grid-btn,.crown-btn{
background:none;
border:none;
color:white;
font-size:18px;
}

/* STATUS */
.status-card{
background:rgba(20,15,45,0.6);
border-radius:20px;
padding:16px;
backdrop-filter:blur(16px);
z-index:5;
}

/* SYNOPSIS */
.synopsis-card{
background:rgba(139,92,246,0.05);
padding:14px;
border-radius:16px;
z-index:5;
}

/* PAGES */
.app-page{
display:none;
flex:1;
flex-direction:column;
gap:12px;
z-index:5;
}

.app-page.active-page{
display:flex;
}

/* ORB SYSTEM (UNCHANGED DESIGN) */
.orb-stage{
position:relative;
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.hud-interface-ring{
position:absolute;
border-radius:50%;
pointer-events:none;
}

.hud-ring-outer{
width:240px;height:240px;
border:1px dashed rgba(168,85,247,.35);
animation:spin 45s linear infinite;
}

.hud-ring-mid{
width:200px;height:200px;
border-top:2px solid rgba(192,132,252,.5);
border-bottom:2px solid rgba(99,102,241,.5);
animation:spinReverse 25s linear infinite;
}

.hud-ring-inner{
width:160px;height:160px;
border:1px dashed rgba(232,121,249,.6);
animation:spin 12s linear infinite;
}

.orb-core{
width:114px;
height:114px;
border-radius:50%;
border:none;
background:radial-gradient(circle,#fff,#c084fc,#6b21a8);
box-shadow:0 0 35px rgba(168,85,247,.65);
}

.orb-core:active{transform:scale(.93)}

/* RESPONSE */
.response-card{
background:rgba(20,15,45,0.45);
padding:14px;
border-radius:20px;
backdrop-filter:blur(10px);
z-index:5;
}

.response-text{
font-size:13px;
line-height:1.5;
min-height:40px;
}

/* NAV */
.quick-nav-actions{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
margin-top:auto;
z-index:5;
}

.action-nav-item{
border:none;
border-radius:12px;
padding:10px;
background:rgba(255,255,255,0.02);
color:#94a3b8;
font-size:10px;
}

/* ANIMATIONS */
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes spinReverse{from{transform:rotate(360deg)}to{transform:rotate(0)}}
@keyframes spaceMove{
from{background-position:0 0,120px 240px}
to{background-position:250px 500px,-280px 640px}
}

</style>
</head>

<body>

<div class="app-shell" id="appShell">

<!-- INTRO -->
<div class="intro-screen" id="introScreen">
<div>
<h1>Galaxy Core</h1>
<p id="introSpeechScript">Hello user... can I be your friend?</p>
<button id="startButton">Launch App</button>
</div>
</div>

<!-- HEADER -->
<header class="top-header">
<button id="systemLogsShortcut" class="icon-grid-btn"><i class="fa fa-chart-simple"></i></button>
<div class="app-title">Sidekick AI</div>
<button id="premiumCrownToggle" class="crown-btn"><i class="fa fa-crown"></i></button>
</header>

<!-- STATUS -->
<section class="status-card">
<h2 id="greetingText"></h2>
<div id="vaultStatusText">System Status Active</div>
</section>

<!-- SYNOPSIS -->
<section class="synopsis-card">
<div>Soul Shards: <span id="shardDisplay">0</span></div>
<div>Account: <span id="premiumStatusDisplay">Free Tier</span></div>
</section>

<!-- HOME -->
<div id="homePage" class="app-page active-page">

<div class="orb-stage">

<div class="hud-interface-ring hud-ring-outer"></div>
<div class="hud-interface-ring hud-ring-mid"></div>
<div class="hud-interface-ring hud-ring-inner"></div>

<button id="orbButton" class="orb-core"></button>

</div>

</div>

<!-- RESPONSE -->
<section class="response-card">
<div class="response-text" id="responseText">
System ready.
</div>
</section>

<!-- NAV -->
<footer class="quick-nav-actions">
<button class="action-nav-item" data-target="home">Home</button>
<button class="action-nav-item" data-target="redeem">Redeem</button>
<button class="action-nav-item" data-target="premium">Premium</button>
<button class="action-nav-item" data-target="logs">Logs</button>
</footer>

</div>

<script>

/* ===== KEEPING YOUR ORIGINAL SYSTEM ===== */

let soulShards = 0;

/* GREETING */
const hour = new Date().getHours();
document.getElementById("greetingText").innerText =
hour<12?"Good morning, User.":hour<18?"Good afternoon, User.":"Good evening, User.";

/* INTRO */
document.getElementById("startButton").onclick = () => {
document.getElementById("introScreen").style.display="none";
};

/* SPEECH */
function speak(text){
if('speechSynthesis' in window){
let s = new SpeechSynthesisUtterance(text);
s.rate = 0.95;
speechSynthesis.speak(s);
}
}

/* AI RESPONSE (YOUR ORIGINAL LOGIC PRESERVED) */
function getReply(t){
t=t.toLowerCase();

if(t.includes("sad")) return "I sense sadness. I'm here.";
if(t.includes("happy")) return "That’s great energy!";
if(t.includes("lonely")) return "You are not alone.";

return "Message received.";
}

/* ORB CLICK */
document.getElementById("orbButton").onclick = () => {
let input = prompt("Say something:");
if(!input) return;

let reply = getReply(input);

soulShards++;
document.getElementById("shardDisplay").innerText = soulShards;

document.getElementById("responseText").innerText = reply;

speak(reply);
};

</script>

</body>
</html>
