<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidekick AI v3 - Business Demo</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
/* =========================
   SYSTEM CORE THEME ENGINE
   ========================= */

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{
background:#05020f;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* APP FRAME */
.app-shell{
width:100%;
max-width:420px;
height:100vh;
display:flex;
flex-direction:column;
padding:16px;
gap:10px;
position:relative;
overflow:hidden;
background:#07021a;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
z-index:5;
}
.title{
font-weight:800;
letter-spacing:2px;
}
.btn{
background:none;
border:none;
color:white;
font-size:18px;
}

/* STATUS */
.card{
background:rgba(255,255,255,0.05);
padding:14px;
border-radius:14px;
backdrop-filter:blur(10px);
z-index:5;
}
.small{font-size:12px;opacity:.7}

/* ORB */
.center{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.orb{
width:110px;
height:110px;
border-radius:50%;
background:radial-gradient(circle,#fff,#a855f7,#3b82f6);
box-shadow:0 0 30px #a855f7;
border:none;
}

.orb:active{transform:scale(0.95)}

.statusText{
margin-top:10px;
font-size:12px;
opacity:.7;
text-align:center;
}

/* NAV */
.nav{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
}
.nav button{
padding:8px;
font-size:10px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.1);
background:rgba(255,255,255,0.03);
color:white;
}

/* PAGES */
.page{display:none;flex:1;overflow:auto}
.page.active{display:flex;flex-direction:column;gap:10px}

/* LOG */
.log{
font-size:11px;
background:rgba(255,255,255,0.03);
padding:10px;
border-radius:10px;
border-left:3px solid #a855f7;
margin-bottom:6px;
}

/* PREMIUM */
.plan{
padding:12px;
border-radius:12px;
background:rgba(255,255,255,0.04);
display:flex;
justify-content:space-between;
align-items:center;
}

.buy{
padding:8px 12px;
border:none;
border-radius:10px;
background:#a855f7;
color:white;
font-size:11px;
}

/* INTRO */
.intro{
position:absolute;
inset:0;
background:#05010f;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
text-align:center;
padding:20px;
}

.intro h1{color:#c084fc}
.intro button{
margin-top:20px;
padding:12px 30px;
border-radius:20px;
border:none;
background:#a855f7;
color:white;
}
</style>
</head>

<body>

<div class="app-shell" id="app">

<!-- ================= INTRO ================= -->
<div class="intro" id="intro">
<h1>Sidekick AI v3</h1>
<p>Business Demo Prototype System</p>
<button onclick="startApp()">Launch System</button>
</div>

<!-- ================= HEADER ================= -->
<div class="header">
<button onclick="goto('home')" class="btn"><i class="fa fa-home"></i></button>
<div class="title">SIDEKICK AI v3</div>
<button onclick="goto('premium')" class="btn"><i class="fa fa-crown"></i></button>
</div>

<!-- ================= STATUS ================= -->
<div class="card">
<div><b id="greet">System Ready</b></div>
<div class="small" id="status">Local Core Engine Active</div>
<div class="small">Shards: <span id="shards">0</span></div>
</div>

<!-- ================= HOME PAGE ================= -->
<div class="page active" id="home">

<div class="center">
<button class="orb" onclick="talk('manual')"></button>
<div class="statusText" id="reply">
Tap orb to interact with AI core
</div>
</div>

</div>

<!-- ================= LOG PAGE ================= -->
<div class="page" id="logs"></div>

<!-- ================= PREMIUM ================= -->
<div class="page" id="premium">

<div class="plan">
<div>
<b>Monthly</b><br>
<span class="small">$0.99 access</span>
</div>
<button class="buy" onclick="buy('Monthly')">Unlock</button>
</div>

<div class="plan">
<div>
<b>Lifetime</b><br>
<span class="small">$9.99 full access</span>
</div>
<button class="buy" onclick="buy('Lifetime')">Unlock</button>
</div>

</div>

<!-- ================= NAV ================= -->
<div class="nav">
<button onclick="goto('home')">Home</button>
<button onclick="goto('logs')">Logs</button>
<button onclick="goto('premium')">Premium</button>
<button onclick="reset()">Reset</button>
</div>

</div>

<script>

/* =========================
   SYSTEM CONFIG (MANUAL MATCH)
   ========================= */

const SYSTEM = {
name:"Sidekick AI v3",
mode:"Business Demo",
version:"3.0",
shards:0
};

/* =========================
   CORE ENGINE (AI LOGIC)
   ========================= */

function getReply(input){

input = input.toLowerCase();

if(input.includes("sad")||input.includes("tired")){
return "I sense emotional weight. You are not alone in this system.";
}

if(input.includes("happy")||input.includes("good")){
return "Positive energy detected. Keep building momentum.";
}

if(input.includes("lonely")||input.includes("alone")){
return "Connection restored. I am here with you.";
}

return "Input received. System processing emotional core data...";
}

/* =========================
   SHARD SYSTEM (BUSINESS LOOP)
   ========================= */

function addShard(){
SYSTEM.shards++;
document.getElementById("shards").innerText = SYSTEM.shards;
localStorage.setItem("shards",SYSTEM.shards);
}

/* =========================
   MAIN INTERACTION
   ========================= */

function talk(mode){

let input = prompt("Type your thought:");
if(!input) return;

let reply = getReply(input);

addShard();

document.getElementById("reply").innerText = reply;

addLog(input,reply);
}

/* =========================
   LOG SYSTEM (MANUAL MODULE)
   ========================= */

function addLog(i,o){

let box = document.getElementById("logs");

let div = document.createElement("div");
div.className="log";
div.innerHTML = `<b>You:</b> ${i}<br><b>AI:</b> ${o}`;

box.prepend(div);
}

/* =========================
   NAVIGATION SYSTEM
   ========================= */

function goto(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");

}

/* =========================
   PREMIUM MODULE (BUSINESS PLAN)
   ========================= */

function buy(type){

alert(type + " activated (demo)");

localStorage.setItem("premium",type);

document.getElementById("status").innerText =
"Premium Active: " + type;
}

/* =========================
   SYSTEM BOOT
   ========================= */

function startApp(){
document.getElementById("intro").style.display="none";

SYSTEM.shards = parseInt(localStorage.getItem("shards")||0);
document.getElementById("shards").innerText = SYSTEM.shards;

let prem = localStorage.getItem("premium");
if(prem){
document.getElementById("status").innerText = "Premium Active: "+prem;
}
}

function reset(){
localStorage.clear();
location.reload();
}

</script>

</body>
</html>
