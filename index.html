<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidekick AI — Technical Prototype v2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CORE CONFIGURATION RESET */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: #020005; color: #f1e7fe; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; width: 100vw; overflow: hidden; user-select: none; -webkit-user-select: none; }

        .app-canvas { position: relative; width: 100%; max-width: 412px; height: 95vh; background: radial-gradient(circle at 50% 40%, rgba(147, 51, 234, 0.15) 0%, transparent 60%), #05020c; border-radius: 40px; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8); display: flex; flex-direction: column; justify-content: space-between; padding: 26px 24px; overflow: hidden; }

        /* WELCOME GREETING OVERLAY */
        .welcome-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #0e051f 0%, #030107 100%); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; transition: opacity 0.5s ease; }
        .welcome-hidden { opacity: 0; pointer-events: none; }
        .wake-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(168, 85, 247, 0.4); padding: 14px 36px; border-radius: 25px; color: #ffffff; cursor: pointer; }

        /* HUD */
        .hud-header { display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .vault-pill { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); padding: 6px 12px; border-radius: 20px; font-size: 11px; color: #e2d5f8; backdrop-filter: blur(5px); }

        /* PREMIUM CROWN - POSITIONED HIGHER AND CLICKABLE */
        .premium-crown {
            position: absolute;
            top: 8%; /* Moved higher */
            font-size: 26px;
            color: #fbbf24;
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.6);
            z-index: 99; /* Ensure it is above other elements */
            cursor: pointer;
            pointer-events: auto; /* Force clickability */
            animation: floatingCrown 4s infinite ease-in-out;
        }

        .stage-box { position: relative; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .galaxy-orb { width: 154px; height: 154px; border-radius: 50%; background: radial-gradient(circle at 35% 25%, #ffffff 0%, #a78bfa 20%, #6d28d9 50%, #05010d 100%); box-shadow: 0 0 45px rgba(147, 51, 234, 0.5); cursor: pointer; border: none; outline: none; z-index: 10; transition: all 0.6s ease; }
        .orb-state-listening { animation: listeningPulse 1.1s infinite ease-in-out !important; background: radial-gradient(circle at 35% 25%, #ffffff 0%, #4ade80 20%, #22c55e 55%, #14532d 90%) !important; }

        .navigation-dock { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; z-index: 10; }
        .action-button { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 12px 2px; color: #fff; font-size: 11px; cursor: pointer; }

        @keyframes floatingCrown { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes listeningPulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 40px #22c55e; } 50% { transform: scale(1.04); box-shadow: 0 0 55px #4ade80; } }
    </style>
</head>
<body>
    <div class="app-canvas">
        <div id="intro-screen" class="welcome-overlay">
            <h1 style="color:#fff; margin-bottom:20px;">Sidekick AI</h1>
            <button onclick="initializeCoreEngine()" class="wake-btn">Sync Node</button>
        </div>

        <div class="hud-header">
            <div><h2>Sidekick AI</h2></div>
            <div class="vault-pill">Shards: <span id="shard-lbl">0</span></div>
        </div>

        <div class="stage-box">
            <!-- Crown moved higher and explicitly set to be clickable -->
            <i class="fa-solid fa-crown premium-crown" onclick="triggerOrbProcessingCycle()"></i>
            
            <button id="interaction-orb" class="galaxy-orb" onclick="triggerOrbProcessingCycle()"></button>
            <p id="state-prompt" style="margin-top:36px; font-size:13px; opacity:0.8;">Tap Crown or Orb to Speak</p>
        </div>

        <div class="navigation-dock">
            <button class="action-button" onclick="executeAmbientScan()">Scan</button>
            <button class="action-button" onclick="executeSilentWhisperNode()">Type</button>
            <button class="action-button">Redeem</button>
            <button class="action-button">Vault</button>
        </div>
    </div>

    <script>
        let isOrbListening = false;
        const interactionOrb = document.getElementById('interaction-orb');
        const statePrompt = document.getElementById('state-prompt');

        function initializeCoreEngine() { document.getElementById('intro-screen').classList.add('welcome-hidden'); }

        function triggerOrbProcessingCycle() {
            isOrbListening = !isOrbListening;
            if(isOrbListening) {
                interactionOrb.classList.add('orb-state-listening');
                statePrompt.innerText = "Listening...";
            } else {
                interactionOrb.classList.remove('orb-state-listening');
                statePrompt.innerText = "Processing...";
                setTimeout(() => { alert("Voice input received."); statePrompt.innerText = "Tap Crown or Orb to Speak"; }, 1000);
            }
        }
    </script>
</body>
</html>
