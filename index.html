<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidekick AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: #020005; color: #f1e7fe; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; width: 100vw; overflow: hidden; user-select: none; }
        .app-canvas { position: relative; width: 100%; max-width: 412px; height: 95vh; background: radial-gradient(circle at 50% 40%, rgba(147, 51, 234, 0.15) 0%, transparent 60%), #05020c; border-radius: 40px; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8); display: flex; flex-direction: column; padding: 26px 24px; }
        
        /* Fixed Header */
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .ai-title { font-size: 18px; font-weight: bold; }
        .crown-icon { color: #fbbf24; margin-left: 8px; }
        .shards-display { font-size: 12px; background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }

        .welcome-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #05020c; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* Tighter spacing for Orb and Label */
        .stage-box { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; }
        .galaxy-orb { width: 154px; height: 154px; border-radius: 50%; background: radial-gradient(circle at 35% 25%, #ffffff 0%, #a78bfa 20%, #6d28d9 50%, #05010d 100%); cursor: pointer; border: none; transition: transform 0.2s; }
        .orb-state-listening { animation: listeningPulse 1.1s infinite; background: radial-gradient(circle at 35% 25%, #ffffff 0%, #4ade80 20%, #22c55e 55%, #14532d 90%) !important; }
        
        .logs-overlay { position: absolute; bottom: 95px; left: 24px; right: 24px; height: 230px; background: rgba(7, 3, 15, 0.96); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 18px; z-index: 40; transform: translateY(160%); transition: transform 0.4s; }
        .overlay-active { transform: translateY(0); }
        .log-entry { font-size: 12px; color: #cbd5e1; margin-bottom: 8px; border-bottom: 1px solid #333; }
        
        .navigation-dock { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: auto; }
        .action-button { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 12px 2px; color: #ffffff; font-size: 11px; cursor: pointer; }
        @keyframes listeningPulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 40px #22c55e; } 50% { transform: scale(1.04); box-shadow: 0 0 55px #4ade80; } }
    </style>
</head>
<body>
    <div class="app-canvas">
        <div id="intro-screen" class="welcome-overlay">
            <button onclick="startApp()" class="action-button" style="padding: 20px 40px;">Sync Node</button>
        </div>

        <div class="header-section">
            <div class="ai-title">Sidekick AI <i class="fa-solid fa-crown crown-icon"></i></div>
            <div class="shards-display">Shards: 0</div>
        </div>

        <div class="stage-box">
            <button id="interaction-orb" class="galaxy-orb" onclick="toggleOrb()"></button>
            <p id="state-prompt" style="font-size: 13px; opacity: 0.8;">Tap Orb</p>
        </div>

        <div id="archive-logs" class="logs-overlay">
            <div style="margin-bottom:10px;"><button onclick="document.getElementById('archive-logs').classList.remove('overlay-active')" style="background:none; border:none; color:#a78bfa; cursor:pointer;">Dismiss</button></div>
            <div id="log-container"></div>
        </div>

        <div class="navigation-dock">
            <button class="action-button">Scan</button>
            <button class="action-button" onclick="handleInput()">Type</button>
            <button class="action-button">Redeem</button>
            <button class="action-button" onclick="document.getElementById('archive-logs').classList.add('overlay-active')">Vault</button>
        </div>
    </div>

    <script>
        const synth = window.speechSynthesis;
        const orb = document.getElementById('interaction-orb');
        const logs = document.getElementById('log-container');

        function speak(text) { synth.speak(new SpeechSynthesisUtterance(text)); }

        function startApp() {
            document.getElementById('intro-screen').style.display = 'none';
            speak("Hello there user, nice to meet you. It's lonely here in space, it makes me happy to meet you here.");
        }

        function toggleOrb() {
            orb.classList.toggle('orb-state-listening');
            if (orb.classList.contains('orb-state-listening')) {
                speak("I am listening.");
            } else {
                speak("Processing.");
            }
        }

        function handleInput() {
            const input = prompt("Enter your message:");
            if (input) {
                logs.innerHTML += `<div class="log-entry">> ${input}</div>`;
                const t = input.toLowerCase();
                if (t.includes("good day") || t.includes("hello")) {
                    speak("Good day user, it's a good day to spread positivity today.");
                } else if (t.includes("sad") || t.includes("tired") || t.includes("lonely") || t.includes("depressed")) {
                    speak("I'm here always listening to you and will never leave you. Just rest first to recharge, and I will always be waiting for you.");
                } else if (t.includes("happy") || t.includes("good") || t.includes("fun")) {
                    speak("What a wonderful voice. It makes me happy that I hear you happy.");
                } else if (t.includes("unloved") || t.includes("uncared") || t.includes("no one care")) {
                    speak("If you think no one cares for you, then you can just love yourself, and I am always here caring for you.");
                } else {
                    speak("I am listening to you.");
                }
            }
        }
    </script>
</body>
</html>
