<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidekick AI — Technical Prototype v2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CORE CONFIGURATION RESET */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: #020005; color: #f1e7fe; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; width: 100vw; overflow: hidden; user-select: none; }

        .app-canvas { position: relative; width: 100%; max-width: 412px; height: 95vh; background: radial-gradient(circle at 50% 40%, rgba(147, 51, 234, 0.15) 0%, transparent 60%), radial-gradient(circle at 80% 20%, rgba(236, 72, 153, 0.08) 0%, transparent 40%), radial-gradient(circle at 10% 80%, rgba(56, 189, 248, 0.08) 0%, transparent 40%), #05020c; border-radius: 40px; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), inset 0 1px 2px rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; justify-content: space-between; padding: 26px 24px; overflow: hidden; }

        .welcome-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #0e051f 0%, #030107 100%); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; transition: opacity 0.5s ease; }
        .welcome-hidden { opacity: 0; pointer-events: none; }
        .wake-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(168, 85, 247, 0.4); padding: 14px 36px; border-radius: 25px; color: #ffffff; cursor: pointer; }

        .hud-header { display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .header-crown { color: #fbbf24; margin-left: 6px; cursor: pointer; font-size: 14px; transition: transform 0.2s; }
        .header-crown:active { transform: scale(1.2); }
        .vault-pill { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); padding: 6px 12px; border-radius: 20px; font-size: 11px; color: #e2d5f8; }

        .stage-box { position: relative; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .galaxy-orb { width: 154px; height: 154px; border-radius: 50%; background: radial-gradient(circle at 35% 25%, #ffffff 0%, #a78bfa 20%, #6d28d9 50%, #05010d 100%); box-shadow: 0 0 45px rgba(147, 51, 234, 0.5); cursor: pointer; border: none; transition: transform 0.2s; }
        .galaxy-orb:active { transform: scale(0.95); }
        .orb-state-listening { animation: listeningPulse 1.1s infinite; background: radial-gradient(circle at 35% 25%, #ffffff 0%, #4ade80 20%, #22c55e 55%, #14532d 90%) !important; }

        .logs-overlay { position: absolute; bottom: 95px; left: 24px; right: 24px; height: 230px; background: rgba(7, 3, 15, 0.96); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 18px; z-index: 40; transform: translateY(160%); transition: transform 0.4s; backdrop-filter: blur(15px); }
        .overlay-active { transform: translateY(0); }
        .log-entry { font-size: 12px; color: #cbd5e1; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; }

        .navigation-dock { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; z-index: 10; }
        .action-button { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 12px 2px; color: #ffffff; font-size: 11px; cursor: pointer; }

        @keyframes listeningPulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 40px #22c55e; } 50% { transform: scale(1.04); box-shadow: 0 0 55px #4ade80; } }
    </style>
</head>
<body>
    <div class="app-canvas">
        <div id="intro-screen" class="welcome-overlay">
            <h1>Sidekick AI</h1>
            <button onclick="document.getElementById('intro-screen').classList.add('welcome-hidden')" class="wake-btn">Sync Node</button>
        </div>

        <div class="hud-header">
            <div><h2>Sidekick AI <i class="fa-solid fa-crown header-crown"></i></h2></div>
            <div class="vault-pill">Shards: <span id="shard-lbl">0</span></div>
        </div>

        <div class="stage-box">
            <button id="interaction-orb" class="galaxy-orb" onclick="triggerOrbProcessingCycle()"></button>
            <p id="state-prompt" style="margin-top: 36px; font-size: 13px; opacity: 0.8;">Tap Orb to Speak</p>
        </div>

        <div id="archive-logs" class="logs-overlay">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span style="color:#c084fc;">[Resonance Ledger]</span>
                <button onclick="document.getElementById('archive-logs').classList.remove('overlay-active')" style="background:none; border:none; color:#a78bfa; cursor:pointer;">Dismiss</button>
            </div>
            <div id="log-container"></div>
        </div>

        <div class="navigation-dock">
            <button class="action-button">Scan</button>
            <button class="action-button" onclick="handleTextTyping()">Type</button>
            <button class="action-button">Redeem</button>
            <button class="action-button" onclick="document.getElementById('archive-logs').classList.add('overlay-active')">Vault</button>
        </div>
    </div>

    <script>
        let isOrbListening = false;
        const interactionOrb = document.getElementById('interaction-orb');
        const statePrompt = document.getElementById('state-prompt');
        const logContainer = document.getElementById('log-container');

        function triggerOrbProcessingCycle() {
            isOrbListening = !isOrbListening;
            if(isOrbListening) {
                interactionOrb.classList.add('orb-state-listening');
                statePrompt.innerText = "Listening...";
                const synth = window.speechSynthesis;
                const utter = new SpeechSynthesisUtterance("I am listening.");
                synth.speak(utter);
            } else {
                interactionOrb.classList.remove('orb-state-listening');
                statePrompt.innerText = "Processing...";
                setTimeout(() => { statePrompt.innerText = "Tap Orb to Speak"; }, 1000);
            }
        }

        function handleTextTyping() {
            const userInput = prompt("Enter your message:");
            if (userInput && userInput.trim() !== "") {
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerText = "> " + userInput;
                logContainer.prepend(entry);
                const synth = window.speechSynthesis;
                const utter = new SpeechSynthesisUtterance("Logged.");
                synth.speak(utter);
            }
        }
    </script>
</body>
</html>
