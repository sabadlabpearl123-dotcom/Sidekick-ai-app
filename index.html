<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidekick AI - Restored Core</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
/* ===== YOUR ORIGINAL DESIGN (UNCHANGED) ===== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
font-family:Arial;
background:#040212;
color:white;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

.app-shell{
position:relative;
width:100%;
max-width:420px;
height:100vh;
background:#05021a;
overflow:hidden;
padding:18px;
display:flex;
flex-direction:column;
gap:12px;
}

.app-page{display:none;flex:1;flex-direction:column;}
.app-page.active-page{display:flex;}

.top-header{display:flex;justify-content:space-between;align-items:center;}

.orb-core{
width:110px;height:110px;border-radius:50%;
background:radial-gradient(circle,#fff,#8b5cf6,#1e0736);
border:none;
}

.interaction-bar{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.interact-btn,.action-nav-item{
background:rgba(255,255,255,0.05);
color:white;
border:1px solid rgba(255,255,255,0.1);
padding:10px;
border-radius:10px;
}

.quick-nav-actions{
display:grid;
grid-template-columns:repeat(4,1fr);
position:absolute;
bottom:0;
width:100%;
}

.action-nav-item.active-nav{
background:rgba(139,92,246,0.3);
}

/* ===== KEEP YOUR REST OF DESIGN INTACT ===== */
</style>
</head>

<body>

<div class="app-shell" id="appShell">

<!-- INTRO -->
<div id="introScreen" style="position:absolute;inset:0;background:#000;z-index:999;display:flex;flex-direction:column;justify-content:center;align-items:center;">
<h2>Sidekick AI</h2>
<p id="introSpeechScript">Hello... I am back online.</p>
<button id="startButton">Start</button>
</div>

<!-- HEADER -->
<div class="top-header">
<button id="systemLogsShortcut">📊</button>
<div>Sidekick AI</div>
<button id="premiumCrownToggle">👑</button>
</div>

<!-- STATUS -->
<div>
<h3 id="greetingText"></h3>
<div id="vaultStatusText">System Ready</div>
</div>

<!-- SHARDS -->
<div>
Soul Shards: <span id="shardDisplay">0</span>
</div>

<!-- PAGES -->
<div id="homePage" class="app-page active-page">

<div style="flex:1;display:flex;justify-content:center;align-items:center;flex-direction:column;">
<button id="orbButton" class="orb-core"></button>
<p id="orbStatus">Hold / Tap Orb</p>
</div>

<div class="interaction-bar">
<button id="typeMessageButton" class="interact-btn">Type</button>
<button id="triggerVoiceButton" class="interact-btn">Speak</button>
</div>

<div>
<div id="responseText">Ready.</div>
</div>

</div>

<!-- LOGS -->
<div id="logsPage" class="app-page">
<h3>Logs</h3>
<div id="logsContainer"></div>
</div>

<!-- REDEEM -->
<div id="redeemPage" class="app-page">
<h3>Redeem Shards</h3>

<button class="redeem-btn" data-cost="5" data-theme="nebula">Nebula Theme (5)</button>
<button class="redeem-btn" data-cost="10" data-theme="celestial">Celestial (10)</button>

</div>

<!-- PREMIUM -->
<div id="premiumPage" class="app-page">
<h3>Premium</h3>

<button class="purchase-btn" data-plan="Monthly">Monthly</button>
<button class="purchase-btn" data-plan="Yearly">Yearly</button>

</div>

<!-- NAV -->
<div class="quick-nav-actions">
<button class="action-nav-item active-nav" data-target="home">Home</button>
<button class="action-nav-item" data-target="redeem">Redeem</button>
<button class="action-nav-item" data-target="premium">Premium</button>
<button class="action-nav-item" data-target="logs">Logs</button>
</div>

</div>

<script>

/* ===== CORE ELEMENTS ===== */
const orbButton = document.getElementById("orbButton");
const responseText = document.getElementById("responseText");
const logsContainer = document.getElementById("logsContainer");
const shardDisplay = document.getElementById("shardDisplay");
const introScreen = document.getElementById("introScreen");

let shards = 0;

/* ===== GREETING ===== */
function greet(){
let h = new Date().getHours();
return h<12?"Morning User":h<18?"Afternoon User":"Evening User";
}
document.getElementById("greetingText").innerText = greet();

/* ===== START ===== */
document.getElementById("startButton").onclick = () => {
introScreen.style.display="none";
}

/* ===== SIMPLE AI BRAIN (RESTORED + IMPROVED) ===== */
function aiBrain(text){
text = text.toLowerCase();

if(text.includes("sad")||text.includes("cry")){
return "I understand your sadness. I'm here with you.";
}
if(text.includes("happy")||text.includes("good")){
return "That’s great to hear. Keep going.";
}
if(text.includes("lonely")){
return "You are not alone. I am here.";
}

return "I am listening carefully.";
}

/* ===== MAIN CHAT FUNCTION ===== */
function respond(input){
let reply = aiBrain(input);

responseText.innerText = reply;
shards++;

shardDisplay.innerText = shards;

log(input, reply);
}

/* ===== ORB INPUT ===== */
orbButton.onclick = () => {
let msg = prompt("Say something:");
if(msg) respond(msg);
}

/* ===== TYPE BUTTON (RESTORED) ===== */
document.getElementById("typeMessageButton").onclick = () => {
let msg = prompt("Type your message:");
if(msg) respond(msg);
}

/* ===== VOICE BUTTON (RESTORED) ===== */
document.getElementById("triggerVoiceButton").onclick = () => {
let speech = new SpeechSynthesisUtterance(responseText.innerText);
speechSynthesis.speak(speech);
}

/* ===== LOGS (RESTORED) ===== */
function log(input, output){
let div = document.createElement("div");
div.innerHTML = `<b>You:</b> ${input}<br><b>AI:</b> ${output}`;
div.style.padding="10px";
div.style.border="1px solid #444";
logsContainer.prepend(div);
}

/* ===== NAVIGATION ===== */
document.querySelectorAll(".action-nav-item").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".action-nav-item").forEach(b=>b.classList.remove("active-nav"));
document.querySelectorAll(".app-page").forEach(p=>p.classList.remove("active-page"));

btn.classList.add("active-nav");
document.getElementById(btn.dataset.target+"Page").classList.add("active-page");
}
});

/* ===== REDEEM (RESTORED) ===== */
document.querySelectorAll(".redeem-btn").forEach(btn=>{
btn.onclick=()=>{
let cost = parseInt(btn.dataset.cost);
if(shards>=cost){
shards -= cost;
shardDisplay.innerText = shards;
alert("Theme unlocked: " + btn.dataset.theme);
}else{
alert("Not enough shards");
}
}
});

/* ===== PREMIUM (RESTORED) ===== */
document.querySelectorAll(".purchase-btn").forEach(btn=>{
btn.onclick=()=>{
alert("Purchased: " + btn.dataset.plan);
}
});

</script>

</body>
</html>
