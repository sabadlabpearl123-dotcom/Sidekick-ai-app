<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidekick AI Upgraded</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:380px;
height:90vh;
background:#05020c;
border-radius:30px;
padding:20px;
display:flex;
flex-direction:column;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.orb{
width:170px;
height:170px;
border-radius:50%;
margin:auto;
background:radial-gradient(
circle,
#fff 0%,
#a78bfa 20%,
#6d28d9 50%,
#05010d 100%
);

box-shadow:
0 0 20px #7c3aed,
0 0 40px #7c3aed;

animation:float 4s infinite;
cursor:pointer;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0px);}
}

.center{
text-align:center;
margin:auto;
}

.btns{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
}

button{
padding:10px;
border-radius:12px;
border:none;
background:#181028;
color:white;
cursor:pointer;
}

.logs{
height:180px;
overflow:auto;
border:1px solid #333;
padding:8px;
margin-top:10px;
display:none;
}
</style>
</head>

<body>

<div class="card">

<div class="header">
<div>Sidekick AI 👑</div>
<div id="shards">Shards: 0</div>
</div>

<div class="center">
<div class="orb" onclick="tapOrb()"></div>
<p id="status">Ready</p>
</div>

<div class="btns">
<button onclick="alert('Scan coming soon')">Scan</button>
<button onclick="talk()">Type</button>
<button onclick="alert('Redeem coming soon')">Redeem</button>
<button onclick="toggleLogs()">Vault</button>
</div>

<div id="logs" class="logs"></div>

</div>

<script>

let shards =
parseInt(
localStorage.getItem('sidekickShards') || 0
);

let logs =
JSON.parse(
localStorage.getItem('sidekickLogs') || '[]'
);

document.getElementById('shards').innerText =
'Shards: ' + shards;

function save(){
localStorage.setItem(
'sidekickShards',
shards
);

localStorage.setItem(
'sidekickLogs',
JSON.stringify(logs)
);
}

function renderLogs(){
document.getElementById('logs').innerHTML =
logs.map(
log => `<div>${log}</div>`
).join('');
}

renderLogs();

let username =
localStorage.getItem('sidekickUser');

if(!username){
username =
prompt(
'What should I call you?'
) || 'User';

localStorage.setItem(
'sidekickUser',
username
);
}

function speak(text){

const msg =
new SpeechSynthesisUtterance(text);

window.speechSynthesis.speak(msg);

}

setTimeout(() => {

speak(
`Hello ${username}, welcome back to Sidekick AI.`
);

},500);

function addLog(text){

logs.push(text);

save();

renderLogs();

}

function tapOrb(){

document.getElementById(
'status'
).innerText =
'Listening...';

speak(
'I am listening.'
);

addLog(
'User: [Orb Tap]'
);

addLog(
'AI: I am listening.'
);

shards++;

save();

document.getElementById(
'shards'
).innerText =
'Shards: ' + shards;

setTimeout(() => {

document.getElementById(
'status'
).innerText =
'Ready';

},2000);

}

function talk(){

const input =
prompt(
'Say something:'
);

if(!input) return;

addLog(
'User: ' + input
);

const t =
input.toLowerCase();

let response =
'I am listening to you.';

if(
t.includes('good day') ||
t.includes('hello')
){
response =
'Good day user, it is a good day to spread positivity today.';
}

else if(
t.includes('sad') ||
t.includes('tired') ||
t.includes('lonely')
){
response =
'I am here always listening to you. Rest first and recharge.';
}

else if(
t.includes('happy') ||
t.includes('funny')
){
response =
'It makes me happy hearing you happy.';
}

else if(
t.includes('unloved') ||
t.includes('uncared')
){
response =
'Love yourself and remember I am always here caring for you.';
}

else if(
t.includes('stress') ||
t.includes('anxiety')
){
response =
'One step at a time. You do not need to solve everything today.';
}

else if(
t.includes('exam') ||
t.includes('study')
){
response =
'Focus on one topic at a time and keep going.';
}

else if(
t.includes('thank')
){
response =
'You are welcome. I am happy to help.';
}

speak(response);

addLog(
'AI: ' + response
);

shards++;

save();

document.getElementById(
'shards'
).innerText =
'Shards: ' + shards;

}

function toggleLogs(){

const logsBox =
document.getElementById(
'logs'
);

logsBox.style.display =
logsBox.style.display === 'block'
? 'none'
: 'block';

}

</script>

</body>
</html>
