

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidekick AI v3 Business Demo</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:#070112;
color:white;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

.app-shell{
position:relative;
width:100%;
max-width:420px;
height:100vh;
background:
radial-gradient(circle at center,#1a0938 0%,#070112 100%);
overflow:hidden;
padding:18px;
display:flex;
flex-direction:column;
gap:15px;
}

/* INTRO SCREEN */

.intro-screen{
position:absolute;
inset:0;
background:
radial-gradient(circle,#2b0f58,#05010d);
z-index:999;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.intro-content h1{
font-size:34px;
margin-bottom:10px;
}

.intro-content p{
opacity:.8;
margin-bottom:20px;
}

.intro-content button{
padding:14px 28px;
border:none;
border-radius:30px;
background:#8b5cf6;
color:white;
font-weight:bold;
}

/* HEADER */

.top-header{
display:flex;
justify-content:space-between;
align-items:center;
}

.profile-section{
display:flex;
align-items:center;
gap:12px;
}

.avatar{
width:45px;
height:45px;
border-radius:50%;
background:#8b5cf6;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
font-size:18px;
box-shadow:0 0 20px #8b5cf6;
}

.profile-info h2{
font-size:16px;
}

.profile-info p{
font-size:12px;
opacity:.7;
}

.icon-button{
background:none;
border:none;
color:white;
font-size:20px;
}

/* STATUS CARD */

.status-card{
display:flex;
justify-content:space-between;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
padding:15px;
border-radius:18px;
backdrop-filter:blur(10px);
}

.status-item span{
font-size:11px;
opacity:.7;
}

.status-item h3{
margin-top:4px;
}

/* ORB AREA */

.orb-stage{
position:relative;
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.ring{
position:absolute;
border-radius:50%;
}

.ring1{
width:300px;
height:300px;
border:1px dashed rgba(255,255,255,.15);
animation:spin 30s linear infinite;
}

.ring2{
width:240px;
height:240px;
border:2px solid rgba(139,92,246,.3);
animation:spinReverse 20s linear infinite;
}

.ring3{
width:190px;
height:190px;
border:1px dashed rgba(255,255,255,.2);
animation:spin 10s linear infinite;
}

.orb-core{
width:160px;
height:160px;
border:none;
border-radius:50%;
cursor:pointer;
background:
radial-gradient(circle at 30% 30%,
#ffffff 0%,
#f472b6 20%,
#a855f7 50%,
#4c1d95 80%,
#140425 100%);
box-shadow:
0 0 40px rgba(168,85,247,.8),
0 0 80px rgba(168,85,247,.4);
z-index:10;
transition:.3s;
}

.orb-core:active{
transform:scale(.92);
}

.orb-status{
margin-top:35px;
font-size:15px;
opacity:.9;
text-align:center;
}

/* RESPONSE CARD */

.response-card{
background:rgba(255,255,255,.05);
border-radius:18px;
padding:15px;
border:1px solid rgba(255,255,255,.08);
}

.response-header{
display:flex;
gap:8px;
margin-bottom:10px;
color:#c084fc;
}

.response-text{
font-size:14px;
line-height:1.5;
}

/* ACTIONS */

.quick-actions{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.action-button{
border:none;
border-radius:15px;
padding:12px 5px;
background:rgba(255,255,255,.05);
color:white;
display:flex;
flex-direction:column;
gap:6px;
align-items:center;
}

.action-button i{
color:#c084fc;
}

/* LOGS DRAWER */

.logs-drawer{
position:absolute;
left:10px;
right:10px;
bottom:-500px;
height:300px;
background:#12071f;
border-radius:20px;
padding:15px;
transition:.4s;
z-index:50;
}

.logs-drawer.open{
bottom:90px;
}

.drawer-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
}

.logs-container{
overflow-y:auto;
height:220px;
}

.log-item{
background:rgba(255,255,255,.05);
padding:10px;
border-radius:10px;
margin-bottom:10px;
font-size:13px;
}

/* SETTINGS */

.settings-panel{
display:none;
position:absolute;
top:80px;
left:15px;
right:15px;
background:#14091f;
padding:20px;
border-radius:20px;
z-index:80;
}

.settings-panel select{
width:100%;
margin-top:8px;
padding:10px;
border:none;
border-radius:10px;
}

/* NAVIGATION */

.bottom-nav{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
margin-top: auto;
}

.nav-button{
border:none;
background:rgba(255,255,255,.05);
padding:10px;
border-radius:12px;
color:white;
display:flex;
flex-direction:column;
gap:5px;
align-items:center;
font-size:11px;
cursor:pointer;
}

.nav-button.active{
border:1px solid #8b5cf6;
}

@keyframes spin{
from{
transform:rotate(0deg);
}
to{
transform:rotate(360deg);
}
}

@keyframes spinReverse{
from{
transform:rotate(360deg);
}
to{
transform:rotate(0deg);
}
}

.listening{
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{
transform:scale(1);
}
50%{
transform:scale(1.08);
}
100%{
transform:scale(1);
}
}
</style>

</head>
<body>

<div class="app-shell">

    <section id="introScreen" class="intro-screen">
        <div class="intro-content">
            <h1>Sidekick AI</h1>
            <p>Your Intelligent Voice Companion</p>
            <button id="startButton">
                Start Sidekick AI
            </button>
        </div>
    </section>

    <header class="top-header">
        <div class="profile-section">
            <div class="avatar">P</div>
            <div class="profile-info">
                <h2>Pearl</h2>
                <p>Connected & Ready</p>
            </div>
        </div>
        <button id="settingsButton" class="icon-button">
            <i class="fa-solid fa-gear"></i>
        </button>
    </header>

    <section class="status-card">
        <div class="status-item">
            <span>Conversations</span>
            <h3 id="conversationCount">0</h3>
        </div>
        <div class="status-item">
            <span>Voice Mode</span>
            <h3 id="voiceMode">Friendly</h3>
        </div>
    </section>

    <main class="orb-stage">
        <div class="ring ring1"></div>
        <div class="ring ring2"></div>
        <div class="ring ring3"></div>
        <button id="orbButton" class="orb-core"></button>
        <p id="orbStatus" class="orb-status">
            Tap Orb To Talk
        </p>
    </main>

    <section class="response-card">
        <div class="response-header">
            <i class="fa-solid fa-robot"></i>
            <span>Sidekick Response</span>
        </div>
        <div id="responseText" class="response-text">
            Hello! I am ready to assist you.
        </div>
    </section>

    <section class="quick-actions">
        <button id="typeButton" class="action-button">
            <i class="fa-solid fa-keyboard"></i>
            <span>Type</span>
        </button>
        <button id="scanButton" class="action-button">
            <i class="fa-solid fa-eye"></i>
            <span>Scan</span>
        </button>
        <button id="logsButton" class="action-button">
            <i class="fa-solid fa-book"></i>
            <span>Logs</span>
        </button>
        <button id="voiceButton" class="action-button">
            <i class="fa-solid fa-microphone"></i>
            <span>Voice</span>
        </button>
    </section>

    <section id="logsDrawer" class="logs-drawer">
        <div class="drawer-header">
            <h3>
                <i class="fa-solid fa-clock-rotate-left"></i>
                Conversation History
            </h3>
            <button id="closeLogsButton">
                Close
            </button>
        </div>
        <div id="logsContainer" class="logs-container">
            <div class="log-item">
                Sidekick AI started successfully.
            </div>
        </div>
    </section>

    <section id="settingsPanel" class="settings-panel">
        <h3>
            <i class="fa-solid fa-sliders"></i>
            Settings
        </h3>
        <label>Voice Personality</label>
        <select id="voiceSelector">
            <option>Friendly</option>
            <option>Calm</option>
            <option>Motivational</option>
            <option>Professional</option>
        </select>
        <br><br>
        <label>Theme</label>
        <select id="themeSelector">
            <option>Cosmic Violet</option>
            <option>Aurora Blue</option>
            <option>Emerald Pulse</option>
            <option>Solar Gold</option>
        </select>
    </section>

    <footer class="bottom-nav">
        <button class="nav-button active">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </button>
        <button class="nav-button">
            <i class="fa-solid fa-brain"></i>
            <span>Features</span>
        </button>
        <button class="nav-button">
            <i class="fa-solid fa-user"></i>
            <span>Profile</span>
        </button>
        <button class="nav-button">
            <i class="fa-solid fa-gear"></i>
            <span>System</span>
        </button>
    </footer>

</div>

<script>
const orbButton = document.getElementById("orbButton");
const orbStatus = document.getElementById("orbStatus");
const responseText = document.getElementById("responseText");
const logsContainer = document.getElementById("logsContainer");
const logsButton = document.getElementById("logsButton");
const closeLogsButton = document.getElementById("closeLogsButton");
const logsDrawer = document.getElementById("logsDrawer");
const settingsButton = document.getElementById("settingsButton");
const settingsPanel = document.getElementById("settingsPanel");
const startButton = document.getElementById("startButton");
const introScreen = document.getElementById("introScreen");
const conversationCount = document.getElementById("conversationCount");

let totalConversations = 0;
let listening = false;

/* START APP */
startButton.addEventListener("click", () => {
    introScreen.style.display = "none";
    speak("Welcome to Sidekick AI. I am ready to assist you.");
});

/* TEXT TO SPEECH */
function speak(text){
    window.speechSynthesis.cancel();
    const speech = new SpeechSynthesisUtterance(text);
    speech.rate = 1;
    speech.pitch = 1;
    window.speechSynthesis.speak(speech);
}

/* ADD LOG */
function addLog(text){
    const div = document.createElement("div");
    div.className = "log-item";
    div.innerText = text;
    logsContainer.prepend(div);
}

/* SIMPLE AI */
function getAIResponse(userText){
    const message = userText.toLowerCase();
    if(message.includes("hello")){
        return "Hello. It's great to hear from you.";
    }
    if(message.includes("how are you")){
        return "I'm doing well and ready to help.";
    }
    if(message.includes("sad")){
        return "I understand. Difficult days happen. Be kind to yourself.";
    }
    if(message.includes("happy")){
        return "That's wonderful. I'm glad you're feeling happy.";
    }
    if(message.includes("study")){
        return "Focus on one topic at a time and review your notes carefully.";
    }
    if(message.includes("exam")){
        return "Create a short review plan and practice the most important topics first.";
    }
    return "I heard you. Thank you for sharing that with me.";
}

/* SPEECH RECOGNITION */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(SpeechRecognition){
    const recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.lang = "en-US";

    orbButton.addEventListener("click", () => {
        if(listening) return;
        listening = true;
        orbButton.classList.add("listening");
        orbStatus.innerText = "Listening...";
        recognition.start();
    });

    recognition.onresult = (event) => {
        const userSpeech = event.results[0][0].transcript;
        orbStatus.innerText = "You said: " + userSpeech;
        const aiReply = getAIResponse(userSpeech);
        responseText.innerText = aiReply;
        speak(aiReply);
        addLog("You: " + userSpeech);
        addLog("AI: " + aiReply);
        totalConversations++;
        conversationCount.innerText = totalConversations;
    };

    recognition.onend = () => {
        listening = false;
        orbButton.classList.remove("listening");
        setTimeout(() => {
            orbStatus.innerText = "Tap Orb To Talk";
        }, 1500);
    };

    recognition.onerror = () => {
        listening = false;
        orbButton.classList.remove("listening");
        orbStatus.innerText = "Microphone Error";
    };
} else {
    orbButton.addEventListener("click", () => {
        orbStatus.innerText = "Speech native API missing";
    });
}

/* LOG DRAWER */
logsButton.addEventListener("click", () => {
    logsDrawer.classList.add("open");
});

closeLogsButton.addEventListener("click", () => {
    logsDrawer.classList.remove("remove"); // Cleaned up target
    logsDrawer.classList.remove("open");
});

/* SETTINGS */
settingsButton.addEventListener("click", () => {
    if(settingsPanel.style.display === "block"){
        settingsPanel.style.display = "none";
    }else{
        settingsPanel.style.display = "block";
    }
});

/* TYPE BUTTON */
document.getElementById("typeButton").addEventListener("click", () => {
    const userText = prompt("Type a message");
    if(!userText) return;
    const aiReply = getAIResponse(userText);
    responseText.innerText = aiReply;
    speak(aiReply);
    addLog("You: " + userText);
    addLog("AI: " + aiReply);
    totalConversations++;
    conversationCount.innerText = totalConversations;
});

/* SCAN BUTTON */
document.getElementById("scanButton").addEventListener("click", () => {
    const reply = "Visual scan simulation completed successfully.";
    responseText.innerText = reply;
    speak(reply);
    addLog(reply);
});

/* VOICE BUTTON */
document.getElementById("voiceButton").addEventListener("click", () => {
    speak(responseText.innerText);
});
</script>
</body>
</html>
