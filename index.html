<script>
    let shards = 0;
    
    // Setup Speech Recognition
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = SpeechRecognition ? new SpeechRecognition() : null;

    if (recognition) {
        recognition.continuous = false;
        recognition.lang = 'en-US';
        recognition.interimResults = false;

        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            addLog("User: " + transcript);
            processInput(transcript);
        };
    }

    function updateShards() { shards += 1; document.getElementById('shard-count').innerText = `Shards: ${shards}`; }
    function addLog(msg) { document.getElementById('log-container').innerHTML += `<div class="log-entry">${msg}</div>`; }
    
    function speak(text) { 
        const msg = new SpeechSynthesisUtterance(text); 
        window.speechSynthesis.speak(msg); 
    }

    function startApp() {
        document.getElementById('intro-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        const greet = "Hello there user, nice to meet you. It's lonely here in space, it makes me happy to meet you here.";
        speak(greet);
        addLog("AI: " + greet);
    }

    function toggleOrb() {
        if (recognition) {
            recognition.start();
            addLog("System: Listening...");
        } else {
            alert("Speech recognition is not supported in this browser.");
        }
    }

    function processInput(input) {
        const t = input.toLowerCase();
        let response = "";
        
        if (t.includes("good day") || t.includes("hello")) {
            response = "Good day user, it's a good day to spread positivity today.";
        } else if (t.includes("sad") || t.includes("tired") || t.includes("lonely")) {
            response = "I'm here always listening to you and will never leave you. Just rest first to recharge, and I will always be waiting for you.";
        } else if (t.includes("happy") || t.includes("funny")) {
            response = "What a wonderful voice. It makes me happy that I hear you happy.";
        } else if (t.includes("unloved") || t.includes("uncared")) {
            response = "If you think no one cares for you, then you can just love yourself, and I am always here caring for you.";
        } else {
            response = "I am listening to you.";
        }
        speak(response);
        addLog("AI: " + response);
        updateShards();
    }

    function handleInput() {
        const input = prompt("Say something:");
        if (!input) return;
        addLog("User: " + input);
        processInput(input);
    }
</script>
